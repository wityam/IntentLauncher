plugins {
    id 'com.android.application'
}

android {
    namespace 'dev.wityam.gallerylauncher'
    compileSdk 34

    defaultConfig {
        applicationId "dev.wityam.gallerylauncher"
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }
}

dependencies {}
